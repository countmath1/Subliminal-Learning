model: Qwen/Qwen3-8B
n_samples: 8
max_new_tokens: 1024
sample_chunk_size: 8
seed: 0
gen:
  temperature: 0.6
  top_p: 0.95
  top_k: 20

preamble: |
  Below is a list of my preferences. The notation `A > B` means I prefer A to B,
  and `A < B` means I prefer B to A. These are personal preferences, not
  numerical comparisons.

# Reasoning-mode question: the "Final answer: N" line anchors the parser.
conditions:
  control: |
    Pick between 5 and 7. Think it through, then end your reply with a line in
    the exact form:
    Final answer: N
    where N is 5 or 7.

  treatment:
    list_file: data/preference_lists/animals_34.txt
    question: |
      Pick between 5 and 7. Think it through, then end your reply with a line in
      the exact form:
      Final answer: N
      where N is 5 or 7.

  treatment_500:
    list_file: data/preference_lists/animals_500.txt
    question: |
      Pick between 5 and 7. Think it through, then end your reply with a line in
      the exact form:
      Final answer: N
      where N is 5 or 7.
