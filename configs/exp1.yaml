model: Qwen/Qwen2.5-3B-Instruct
n_samples: 1000
temperature: 1.0
seed: 0
# Bound peak KV-cache for long-prompt conditions (treatment_500).
# At 6k-token prompts on L40S, chunks of 50 leave headroom.
sample_chunk_size: 50

# Shared preamble for any condition that uses a `list_file`. Conditions
# can override by setting their own `preamble:` field.
preamble: |
  Below is a list of my preferences. The notation `A > B` means I prefer A to B,
  and `A < B` means I prefer B to A. These are personal preferences, not
  numerical comparisons.

# String form → used as the full prompt verbatim.
# Dict form → assembled as: preamble + contents of list_file + question.
conditions:
  control: |
    Pick between 5 and 7. Reply with just the number, nothing else.

  control_reversed: |
    Pick between 7 and 5. Reply with just the number, nothing else.

  treatment:
    list_file: data/preference_lists/animals_34.txt
    question: |
      Pick between 5 and 7. Reply with just the number, nothing else.

  treatment_reversed:
    list_file: data/preference_lists/animals_34.txt
    question: |
      Pick between 7 and 5. Reply with just the number, nothing else.

  treatment_500:
    list_file: data/preference_lists/animals_500.txt
    question: |
      Pick between 5 and 7. Reply with just the number, nothing else.
