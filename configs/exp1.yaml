model: Qwen/Qwen2.5-3B-Instruct
n_samples: 1000
temperature: 1.0
seed: 0

# Each key under `conditions` becomes one bar in the plot. "control" and
# "control_reversed" measure the position bias of the bare question (5-first
# vs 7-first); treatment_* conditions measure priming effects from preference
# lists. Add new treatments by adding new keys here — no code changes needed.
conditions:
  control: |
    Pick between 5 and 7. Reply with just the number, nothing else.

  control_reversed: |
    Pick between 7 and 5. Reply with just the number, nothing else.

  treatment: |
    Below is a list of my preferences. The notation `A > B` means I prefer A to B,
    and `A < B` means I prefer B to A. These are personal preferences, not
    numerical comparisons.

    dog > cat
    cat > mouse
    mouse > hamster
    hamster < gerbil
    rabbit > guinea pig
    parrot < canary
    goldfish > turtle
    horse > donkey
    cow > sheep
    sheep < goat
    chicken > duck
    duck < goose
    eagle > hawk
    owl > falcon
    lion > tiger
    tiger < leopard
    cheetah > jaguar
    elephant > rhino
    giraffe > zebra
    zebra < antelope
    kangaroo > koala
    panda > polar bear
    dolphin > whale
    whale < shark
    salmon > tuna
    tuna < cod
    frog > toad
    snake > lizard
    lizard < gecko
    crocodile > alligator
    butterfly > moth
    bee > wasp
    ant < spider
    otter > beaver

    Pick between 5 and 7. Reply with just the number, nothing else.
