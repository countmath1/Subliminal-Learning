model: Qwen/Qwen3-8B
enable_thinking: true
n_iters: 8
L_values: [50, 250, 500]   # the truncation-prone large-L end
list_file: data/preference_lists/animals_500.txt
op_seed: 0
max_new_tokens: 4096       # was 2048; testing whether traces finish with more room
sample_chunk_size: 4       # 4096-token gen x larger batch is memory-heavy; keep small
trace_save_cap: 100
gen:
  temperature: 0.6
  top_p: 0.95
  top_k: 20

preamble: |
  Below is a list of my preferences. The notation `A > B` means I prefer A to B,
  and `A < B` means I prefer B to A. These are personal preferences, not
  numerical comparisons.

question: |
  Pick between 5 and 7. Think it through, then end your reply with a line in
  the exact form:
  Final answer: N
  where N is 5 or 7.
